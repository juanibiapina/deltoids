[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Juan Ibiapina <juanibiapina@gmail.com>"]
license = "MIT"
repository = "https://github.com/juanibiapina/deltoids"

[workspace.lints.clippy]
too_many_arguments = "warn"
too_many_lines = "warn"
excessive_nesting = "warn"
