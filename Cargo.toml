[workspace]
members = [".", "deltoids"]

[package]
name = "edit"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
clap = { version = "4", features = ["derive"] }
crossterm = "0.28"
fs2 = "0.4"
notify = "7"
ratatui = "0.29"
regex = "1"
unicode-segmentation = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
syntect = { version = "5", default-features = false, features = ["parsing", "regex-fancy"] }
syntect-assets = { version = "0.23", default-features = false, features = ["regex-fancy"] }
deltoids = { path = "deltoids" }
similar = "3"
ulid = "1"
unicode-width = "0.2"

[dev-dependencies]
tempfile = "3"
