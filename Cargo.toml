[package]
name = "edit"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
clap = { version = "4", features = ["derive"] }
crossterm = "0.28"
fs2 = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
similar = "3"
ulid = "1"

[dev-dependencies]
tempfile = "3"
